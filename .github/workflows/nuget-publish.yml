name: Publish NuGet packages

on:
  push:
    tags:
      - 'v*.*.*'
      - '*.*.*'

permissions:
  contents: read

jobs:
  publish:
    name: Pack and publish
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Resolve tag version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be a NuGet version such as v1.2.3, 1.2.3, or v1.2.3-beta.1." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: |
          dotnet restore src/DnRelay/DnRelay.csproj
          dotnet restore src/DnRelay.Tool/DnRelay.Tool.csproj

      - name: Build
        run: |
          dotnet build src/DnRelay/DnRelay.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}
          dotnet build src/DnRelay.Tool/DnRelay.Tool.csproj --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Pack dnrelay
        run: >
          dotnet pack src/DnRelay/DnRelay.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:Version=${{ steps.version.outputs.version }}

      - name: Pack dnrelay-tool
        run: >
          dotnet pack src/DnRelay.Tool/DnRelay.Tool.csproj
          --configuration Release
          --no-build
          --output artifacts/packages
          -p:PackageVersion=${{ steps.version.outputs.version }}
          -p:Version=${{ steps.version.outputs.version }}

      - name: NuGet login
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish
        run: >
          dotnet nuget push "artifacts/packages/*.nupkg"
          --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
